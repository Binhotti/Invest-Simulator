<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invest Simulator</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Invest Simulator 💰</h1>

      <div class="form">
        <label>Valor Inicial (R$)</label>
        <input type="number" id="initial" placeholder="1000" />

        <label>Taxa Mensal (%)</label>
        <input type="number" id="rate" placeholder="5" />

        <label>Tempo (mês)</label>
        <input type="number" id="time" placeholder="12" />

        <button onclick="calculate()">Calcular</button>
      </div>
    </div>

    <div class="result">
      <h2>Valor Final:</h2>
      <p id="result">R$ 0.00</p>
      <h2>Lucro:</h2>
      <p id="profit">R$ 0.00</p>
    </div>
    
    <script src="./js/script.js"></script>
  </body>
</html>
