<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Invest Simulator</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="container">
      <h1>Invest Simulator 💰</h1>

      <div class="form">
        <label>Valor Inicial (R$)</label>
        <input type="number" id="initial" />

        <label>Contribuição Mensal (R$)</label>
        <input type="number" id="monthly" />

        <label>Taxa Mensal (%)</label>
        <input type="number" id="rate" />

        <label>Tempo (mês)</label>
        <input type="number" id="time" />

        <button onclick="calculate()">Calcular</button>
      </div>
    </div>

    <div class="result">
      <h2>Valor Final:</h2>
      <p id="result">R$ 0.00</p>

      <div class="profit">
        <h2>Lucro:</h2>
        <p id="profit">R$ 0.00</p>
      </div>
    </div>

    <div id="chart-container">
      <canvas id="chart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/chart.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
